# cargo-audit configuration for brigid/core
#
# RUSTSEC-2023-0071: rsa Marvin attack timing side-channel
# Pulled in by sqlx-macros-core (compile-time query verification imports all
# DB backends). This project uses SQLite only and does not use RSA or MySQL.
# No upstream fix is available.
#
# RUSTSEC-2024-0436: paste crate marked unmaintained.
# Transitive dependency via webauthn-rs-proto. `paste` is a proc-macro helper
# with no runtime security impact. No fix is available upstream.
[advisories]
ignore = ["RUSTSEC-2023-0071", "RUSTSEC-2024-0436"]
