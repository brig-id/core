# Opt-in `mold` linker for x86_64 Linux builds.
#
# `mold` cuts incremental link time dramatically but is not part of a default
# Rust install — on a host without `mold` on `$PATH`, even `cargo test` would
# fail before compilation. The brig·id devcontainer (`brig-id/.dev`) installs
# it and exports `RUSTFLAGS="-C link-arg=-fuse-ld=mold"`, so the default
# environment still gets the speedup without forcing it on contributors who
# build outside the devcontainer or on CI runners that do not pre-install it.
#
# To enable for an ad-hoc local build, uncomment the rustflags line below or
# export the same value via the environment:
#
#     RUSTFLAGS="-C link-arg=-fuse-ld=mold" cargo test --workspace
#
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]
