[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "ISC",
  "BSD-3-Clause",
  "CC0-1.0",
  "Zlib",
  "CDLA-Permissive-2.0",
  "MPL-2.0",
  "BSL-1.0",
]
confidence-threshold = 0.8

[advisories]
version = 2
yanked = "deny"
ignore = [
  # rsa Marvin attack: pulled in by sqlx-macros-core (compile-time query
  # checking imports all DB backends). We do not use RSA or MySQL.
  # No fix available upstream.
  { id = "RUSTSEC-2023-0071", reason = "transitive via sqlx-macros-core; project uses SQLite only; no fix available" },
  # paste crate marked unmaintained; pulled in transitively by webauthn-rs-proto.
  # No security impact — paste is a proc-macro helper only.
  { id = "RUSTSEC-2024-0436", reason = "transitive via webauthn-rs-proto; paste is a proc-macro with no runtime security impact; no fix available" },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[[bans.skip-tree]]
# webauthn-rs-core unconditionally depends on openssl via webauthn-attestation-ca
# (used for X.509 attestation certificate chain verification — not for TLS).
# All network connections in brigid use rustls; OpenSSL is never used for TLS.
# This dependency cannot be removed without replacing the webauthn-rs library.
# Tracked upstream: https://github.com/kanidm/webauthn-rs/issues
name = "openssl-sys"
reason = "transitive dep of webauthn-rs-core via webauthn-attestation-ca for X.509 attestation cert parsing; not used for TLS connections (rustls handles all TLS); no upstream alternative available"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/brig-id/crypto"]
