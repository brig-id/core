description = "Webauthn Authenticator Client Library"
homepage = "https://github.com/kanidm/webauthn-rs"
readme = "README.md"
license = "MPL-2.0"
repository = "https://github.com/kanidm/webauthn-rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[features]
