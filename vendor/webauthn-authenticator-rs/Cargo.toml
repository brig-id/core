    "dep:openssl",
    "dep:openssl-sys",
]
ctap2 = [
    "crypto",
    "dep:hex",
    "dep:serde_bytes",
    "dep:tokio",
    "dep:tokio-stream",
]
ctap2-management = ["ctap2"]
default = []
mozilla = [
    "dep:authenticator",
    "dep:rpassword",
]
nfc = [
    "ctap2",
    "dep:pcsc",
]
nfc_allow_ignored_readers = []
nfc_raw_transmit = ["nfc"]
qrcode = [
    "dep:qrcode",
    "ui-cli",
]
softpasskey = [
    "crypto",
]
softtoken = [
    "crypto",
    "ctap2",
]
u2fhid = ["mozilla"]
ui-cli = ["dep:rpassword"]
