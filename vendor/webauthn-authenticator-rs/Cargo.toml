[package]
edition = "2021"
rust-version = "1.88"
name = "webauthn-authenticator-rs"
version = "0.5.5"
authors = [
    "William Brown <william@blackhats.net.au>",
    "Michael Farrell <micolous+git@gmail.com>",
    "James Hodgkinson <james@terminaloutcomes.com>",
]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
